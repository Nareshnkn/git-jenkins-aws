name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create SSH key
      run: |
        echo "${{ secrets.EC2_KEY }}" > key.pem
        chmod 600 key.pem

    - name: Deploy to EC2
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          sudo rm -rf /var/www/html/*
          git clone https://github.com/Nareshnkn/git-jenkins-aws.git /tmp/site
          sudo cp -r /tmp/site/* /var/www/html/
          sudo systemctl restart nginx
        EOF